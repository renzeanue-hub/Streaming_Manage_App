name: streaming_manage_app
description: Streaming schedule manager for viewers.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # State
  flutter_riverpod: ^2.5.1

  # Calendar (week/day/month)
  syncfusion_flutter_calendar: ^28.0.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.4.2

  # Share
  share_plus: ^10.0.2

  # URL open
  url_launcher: ^6.3.0

  firebase_core: ^3.2.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true